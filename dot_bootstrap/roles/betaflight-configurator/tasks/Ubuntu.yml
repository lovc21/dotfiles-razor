---
- name: "betaflight-configurator | {{ ansible_facts['distribution'] }} | Check if installed"
  ansible.builtin.command: snap list betaflight-configurator
  register: betaflight_check
  changed_when: false
  failed_when: false

- name: "betaflight-configurator | {{ ansible_facts['distribution'] }} | Install via snap"
  ansible.builtin.command: snap install betaflight-configurator
  become: true
  when: betaflight_check.rc != 0
