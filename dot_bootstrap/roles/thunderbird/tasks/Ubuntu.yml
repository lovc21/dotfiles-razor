---
- name: "thunderbird | {{ ansible_facts['distribution'] }} | Check if installed"
  ansible.builtin.command: snap list thunderbird
  register: thunderbird_check
  changed_when: false
  failed_when: false

- name: "thunderbird | {{ ansible_facts['distribution'] }} | Install via snap"
  ansible.builtin.command: snap install thunderbird
  become: true
  when: thunderbird_check.rc != 0
