---
- name: "element-desktop | {{ ansible_facts['distribution'] }} | Add Element GPG key"
  ansible.builtin.get_url:
    url: https://packages.element.io/debian/element-io-archive-keyring.gpg
    dest: /usr/share/keyrings/element-io-archive-keyring.gpg
    mode: "0644"
  become: true

- name: "element-desktop | {{ ansible_facts['distribution'] }} | Add Element apt repository"
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/element-io-archive-keyring.gpg] https://packages.element.io/debian/ default main"
    filename: element-io
    state: present
    update_cache: true
  become: true

- name: "element-desktop | {{ ansible_facts['distribution'] }} | Install element-desktop"
  ansible.builtin.apt:
    name: element-desktop
    state: present
  become: true
