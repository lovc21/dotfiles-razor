---
- name: "ghostty | {{ ansible_facts['distribution'] }} | Install software-properties-common (for add-apt-repository)"
  ansible.builtin.apt:
    name: software-properties-common
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: "ghostty | {{ ansible_facts['distribution'] }} | Add mkasberg/ghostty PPA"
  ansible.builtin.apt_repository:
    repo: ppa:mkasberg/ghostty
    state: present
    update_cache: true
  become: true

- name: "ghostty | {{ ansible_facts['distribution'] }} | Install ghostty"
  ansible.builtin.apt:
    name: ghostty
    state: present
  become: true
