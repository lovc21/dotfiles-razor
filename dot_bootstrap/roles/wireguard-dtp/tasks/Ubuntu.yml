---
- name: "wireguard-dtp | {{ ansible_facts['distribution'] }} | Check if installed"
  ansible.builtin.command: snap list wireguard-dtp
  register: wireguard_dtp_check
  changed_when: false
  failed_when: false

- name: "wireguard-dtp | {{ ansible_facts['distribution'] }} | Install via snap"
  ansible.builtin.command: snap install wireguard-dtp
  become: true
  when: wireguard_dtp_check.rc != 0
