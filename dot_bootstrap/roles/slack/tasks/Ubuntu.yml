---
- name: "slack | {{ ansible_facts['distribution'] }} | Check if installed"
  ansible.builtin.command: snap list slack
  register: slack_check
  changed_when: false
  failed_when: false

- name: "slack | {{ ansible_facts['distribution'] }} | Install via snap"
  ansible.builtin.command: snap install slack
  become: true
  when: slack_check.rc != 0
