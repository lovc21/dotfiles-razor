---
- name: "vlc | {{ ansible_facts['distribution'] }} | Check if installed"
  ansible.builtin.command: snap list vlc
  register: vlc_check
  changed_when: false
  failed_when: false

- name: "vlc | {{ ansible_facts['distribution'] }} | Install via snap"
  ansible.builtin.command: snap install vlc
  become: true
  when: vlc_check.rc != 0
