---
- name: "yubikey-agent | {{ ansible_facts['distribution'] }} | Install yubikey-agent and supporting packages"
  ansible.builtin.dnf:
    name:
      - yubikey-agent
      - openssh-askpass
      - pcsc-lite
      - pcsc-lite-ccid
      - opensc
      - pinentry-gtk
      - pinentry-tty
    state: present
  become: true

- name: "yubikey-agent | {{ ansible_facts['distribution'] }} | Ensure pcscd service is enabled and running"
  ansible.builtin.systemd:
    name: pcscd
    enabled: true
    state: started
  become: true
