---
- name: "Packer | {{ ansible_facts['distribution'] }} | Add HashiCorp dnf repository"
  ansible.builtin.yum_repository:
    name: hashicorp
    description: HashiCorp Stable - $basearch
    baseurl: https://rpm.releases.hashicorp.com/fedora/$releasever/$basearch/stable
    gpgcheck: true
    gpgkey: https://rpm.releases.hashicorp.com/gpg
  become: true

- name: "Packer | {{ ansible_facts['distribution'] }} | Install Packer"
  ansible.builtin.dnf:
    name: packer
    state: present
  become: true
